name: StudyFund
options:
  bundleIdPrefix: com.shimondeitel.studyfund
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  StudyFund:
    type: application
    platform: iOS
    sources:
      - path: StudyFund
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studyfund
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: StudyFund/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StudyFundTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StudyFundTests
      - path: StudyFund.storekit
    dependencies:
      - target: StudyFund
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studyfund.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StudyFundUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StudyFundUITests
    dependencies:
      - target: StudyFund
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studyfund.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  StudyFund:
    build:
      targets:
        StudyFund: all
        StudyFundTests: [test]
        StudyFundUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: StudyFund.storekit
    test:
      config: Debug
      storeKitConfiguration: StudyFund.storekit
      targets:
        - StudyFundTests
        - StudyFundUITests
    archive:
      config: Release
